app-id: org.pyeduc.App
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: pyeduc
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
modules:
  - name: pyeduc
    buildsystem: simple
    build-commands:
      - mkdir -p /app/opt/pyeduc
      - cp -r build/linux/* /app/opt/pyeduc/
      - mkdir -p /app/bin
      - ln -s /app/opt/pyeduc/pyeduc /app/bin/pyeduc
